version: '3.9'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: cryptoalert-mssql

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123!"

    ports:
      - "1433:1433"

    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: